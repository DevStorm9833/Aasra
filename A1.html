<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ElderConnect | Community Support</title>
    
    <!-- Google Fonts: Inter for professional clarity -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind Config for Professional Palette -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'brand-primary': '#0F766E',
                        'brand-dark': '#134E4A',
                        'brand-accent': '#F59E0B',
                        'canvas-bg': '#FAF9F6',
                        'surface-white': '#FFFFFF',
                        'text-main': '#1C1917',
                        'text-muted': '#44403C',
                        'state-error': '#BE123C',
                        'state-success': '#15803D',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'floating': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                        'sos': '0 0 20px rgba(190, 18, 60, 0.4)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        *:focus-visible { outline: 3px solid #F59E0B; outline-offset: 4px; border-radius: 4px; }
        .smooth-transition { transition: all 0.2s ease-in-out; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        #localVideo { transform: scaleX(-1); }
        
        /* Floating Button Animation */
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0 0 rgba(190, 18, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(190, 18, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(190, 18, 60, 0); }
        }
        .sos-pulse { animation: ring-pulse 2s infinite; }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            min-width: 64px;
        }
    </style>
</head>
<body class="bg-canvas-bg text-text-main min-h-screen flex flex-col antialiased transition-colors duration-300" id="main-body">

    <!-- Skip Link -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 bg-brand-accent text-black font-bold px-6 py-3 rounded-lg z-50 shadow-xl">Skip to Main Content</a>

    <!-- ========================================== -->
    <!-- PROFESSIONAL HEADER -->
    <!-- ========================================== -->
    <header class="bg-surface-white border-b border-stone-200 sticky top-0 z-40 shadow-soft">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <!-- Branding -->
            <div onclick="router('landing')" class="cursor-pointer flex items-center gap-3 group">
                <div class="bg-brand-primary text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-sm group-hover:bg-brand-dark transition-colors">
                    <i class="fa-solid fa-seedling text-xl"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-lg font-bold text-brand-dark leading-tight tracking-tight">ElderConnect</h1>
                    <p class="text-[10px] text-text-muted font-medium tracking-wide uppercase">Community Care</p>
                </div>
            </div>

            <!-- Enhanced Navbar Controls -->
            <nav class="flex items-center gap-1 md:gap-4">
                <!-- Speak Button -->
                <button onclick="toggleVoiceAssistant()" id="voice-btn" class="nav-btn text-brand-primary hover:bg-stone-100" aria-label="Speak">
                    <i class="fa-solid fa-microphone text-xl mb-1"></i>
                    <span class="text-[10px] font-bold uppercase tracking-tight">Speak</span>
                </button>

                <!-- Read Button -->
                <button onclick="readCurrentPage()" id="read-btn" class="nav-btn text-blue-600 hover:bg-stone-100" aria-label="Read Page Out Loud">
                    <i class="fa-solid fa-volume-high text-xl mb-1"></i>
                    <span class="text-[10px] font-bold uppercase tracking-tight">Read</span>
                </button>

                <!-- Settings Button (Perfected) -->
                <button onclick="toggleSettings()" class="nav-btn text-stone-600 hover:bg-stone-100 group" aria-label="Open Settings">
                    <div class="relative">
                        <i class="fa-solid fa-gear text-xl mb-1 group-hover:rotate-45 transition-transform duration-500"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-tight">Settings</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- FLOATING SOS BUTTON -->
    <!-- ========================================== -->
    <button onclick="triggerEmergency()" 
            class="fixed bottom-6 right-6 z-50 w-20 h-20 md:w-24 md:h-24 bg-state-error text-white rounded-full shadow-sos sos-pulse flex flex-col items-center justify-center transition-transform hover:scale-110 active:scale-95 group"
            aria-label="Emergency SOS">
        <i class="fa-solid fa-phone-flip text-2xl md:text-3xl mb-1 group-hover:animate-bounce"></i>
        <span class="text-xs md:text-sm font-black uppercase tracking-widest">SOS</span>
    </button>

    <!-- ========================================== -->
    <!-- MAIN CONTENT AREA -->
    <!-- ========================================== -->
    <main id="main-content" class="flex-grow w-full max-w-5xl mx-auto p-4 md:p-6 mb-24" aria-live="polite">
        <!-- Views injected here -->
    </main>

    <!-- ========================================== -->
    <!-- MODALS & OVERLAYS -->
    <!-- ========================================== -->
    
    <!-- Settings Modal -->
    <dialog id="settings-modal" class="backdrop:bg-slate-900/60 p-0 rounded-2xl shadow-2xl w-[90%] max-w-md border-0">
        <div class="bg-surface-white overflow-hidden">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <div class="flex items-center gap-3">
                    <div class="bg-stone-200 p-2 rounded-lg"><i class="fa-solid fa-gear text-stone-600"></i></div>
                    <h2 class="text-xl font-bold text-brand-dark">App Settings</h2>
                </div>
                <button onclick="document.getElementById('settings-modal').close()" class="w-10 h-10 rounded-full flex items-center justify-center bg-stone-100 text-stone-500 hover:text-stone-800 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 space-y-8">
                <!-- Text Size Section -->
                <div>
                    <label class="block text-xs font-bold text-stone-400 uppercase mb-4 tracking-widest">Accessibility: Text Size</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="adjustFont('normal')" class="py-4 px-4 rounded-2xl border-2 border-stone-100 hover:border-brand-primary bg-stone-50 text-brand-dark font-bold flex flex-col items-center gap-1 transition-all">
                            <span class="text-base">Aa</span>
                            <span class="text-xs">Normal</span>
                        </button>
                        <button onclick="adjustFont('large')" class="py-4 px-4 rounded-2xl border-2 border-stone-100 hover:border-brand-primary bg-stone-50 text-brand-dark font-black flex flex-col items-center gap-1 transition-all">
                            <span class="text-2xl">Aa</span>
                            <span class="text-xs">Extra Large</span>
                        </button>
                    </div>
                </div>

                <!-- High Contrast Section -->
                <div>
                    <label class="block text-xs font-bold text-stone-400 uppercase mb-4 tracking-widest">Accessibility: Color</label>
                    <button onclick="toggleHighContrast()" id="contrast-btn" class="w-full py-5 rounded-2xl border-2 border-stone-800 bg-stone-900 text-white font-bold flex items-center justify-center gap-3 shadow-lg hover:bg-black transition-all">
                        <i class="fa-solid fa-circle-half-stroke text-xl"></i> 
                        <span>Switch to High Contrast</span>
                    </button>
                </div>

                <!-- Voice Info -->
                <div class="p-4 bg-teal-50 rounded-xl border border-teal-100 flex gap-4">
                    <i class="fa-solid fa-circle-info text-teal-600 mt-1"></i>
                    <p class="text-xs text-teal-800 leading-relaxed">
                        Tip: You can use the <strong>Speak</strong> button in the header to navigate using only your voice.
                    </p>
                </div>
            </div>
        </div>
    </dialog>

    <!-- Voice Listening Overlay -->
    <div id="voice-overlay" class="hidden fixed inset-0 bg-brand-dark/95 z-50 flex flex-col items-center justify-center text-white backdrop-blur-md">
        <div class="relative">
            <div class="absolute inset-0 bg-white/20 rounded-full animate-ping"></div>
            <div class="bg-white p-8 rounded-full mb-8 relative z-10">
                <i class="fa-solid fa-microphone text-6xl text-brand-primary"></i>
            </div>
        </div>
        <h2 class="text-3xl font-bold mb-4">Listening...</h2>
        <p class="text-xl text-teal-100 text-center max-w-md px-6">"Go Home", "Events", "Medicine", or "Get Help"</p>
        <button onclick="toggleVoiceAssistant()" class="mt-12 bg-state-error text-white px-10 py-4 rounded-full font-bold shadow-xl">Cancel</button>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT LOGIC -->
    <!-- ========================================== -->
    <script>
        // --- State Management ---
        const appState = {
            role: null,
            view: 'landing',
            locationSharing: false,
            recognition: null,
            isReading: false,
            data: {
                user: { name: 'Guest', points: 120 },
                events: [
                    { id: 1, title: 'Morning Yoga Park', date: 'Tomorrow, 7:00 AM', type: 'Health', attendees: 12 },
                    { id: 2, title: 'Doctor Talk: Heart Health', date: 'Sunday, 10:00 AM', type: 'Educational', attendees: 45 }
                ],
                medicines: [
                    { name: 'Blood Pressure Pill', time: 'Morning (8 AM)', taken: true },
                    { name: 'Calcium Supplement', time: 'After Lunch (2 PM)', taken: false },
                    { name: 'Diabetes Insulin', time: 'Night (9 PM)', taken: false }
                ]
            }
        };

        const main = document.getElementById('main-content');
        const body = document.getElementById('main-body');

        window.addEventListener('DOMContentLoaded', () => {
            initVoiceAPI();
            router('landing');
        });

        // --- Screen Reader Feature ---
        function readCurrentPage() {
            if (appState.isReading) {
                window.speechSynthesis.cancel();
                appState.isReading = false;
                document.getElementById('read-btn').classList.remove('bg-blue-100');
                return;
            }

            const textToRead = main.innerText;
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.rate = 0.9; // Slightly slower for elderly
            
            utterance.onstart = () => {
                appState.isReading = true;
                document.getElementById('read-btn').classList.add('bg-blue-100');
            };

            utterance.onend = () => {
                appState.isReading = false;
                document.getElementById('read-btn').classList.remove('bg-blue-100');
            };

            window.speechSynthesis.speak(utterance);
        }

        // --- Voice API ---
        function initVoiceAPI() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                appState.recognition = new SpeechRec();
                appState.recognition.continuous = false;
                appState.recognition.lang = 'en-US';

                appState.recognition.onstart = () => {
                    document.getElementById('voice-overlay').classList.remove('hidden');
                };

                appState.recognition.onend = () => {
                    document.getElementById('voice-overlay').classList.add('hidden');
                };

                appState.recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript.toLowerCase();
                    processVoiceCommand(transcript);
                };
            }
        }

        function toggleVoiceAssistant() {
            if (!appState.recognition) {
                alert("Voice control is not supported in this browser.");
                return;
            }
            if (document.getElementById('voice-overlay').classList.contains('hidden')) {
                appState.recognition.start();
            } else {
                appState.recognition.stop();
            }
        }

        function processVoiceCommand(cmd) {
            if (cmd.includes('home') || cmd.includes('back')) router('senior-home');
            else if (cmd.includes('help') || cmd.includes('emergency') || cmd.includes('sos')) triggerEmergency();
            else if (cmd.includes('event')) router('events-hub');
            else if (cmd.includes('medicine') || cmd.includes('pill')) router('daily-care');
            else if (cmd.includes('video') || cmd.includes('call')) router('video-call');
            else alert(`Command not recognized: "${cmd}". Try "Go Home" or "Get Help".`);
        }

        // --- Router ---
        function router(view) {
            appState.view = view;
            window.speechSynthesis.cancel(); // Stop reading on navigation
            window.scrollTo(0, 0);
            main.style.opacity = '0';
            
            setTimeout(() => {
                const renderMap = {
                    'landing': renderLanding,
                    'senior-home': renderSeniorHome,
                    'request-hub': renderRequestHub,
                    'volunteer-dash': renderVolunteerDash,
                    'community': renderCommunity,
                    'events-hub': renderEventsHub,
                    'safety-guard': renderSafetyGuard,
                    'daily-care': renderDailyCare,
                    'wisdom-corner': renderWisdomCorner,
                    'video-call': renderVideoCall,
                    'doc-scanner': renderDocScanner
                };
                
                main.innerHTML = renderMap[view] ? renderMap[view]() : `<h2 class="text-center">Page Not Found</h2>`;
                main.style.opacity = '1';

                if (view === 'video-call') startLocalVideo();
                if (view === 'safety-guard') initMapSimulator();
            }, 200);
        }

        // --- VIEW RENDERERS ---

        function renderLanding() {
            return `
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center animate-fade-in">
                    <div class="bg-teal-50 w-24 h-24 rounded-full flex items-center justify-center mb-8 shadow-inner">
                         <i class="fa-solid fa-heart-pulse text-4xl text-brand-primary"></i>
                    </div>
                    <h2 class="text-4xl font-black text-brand-dark mb-4">Welcome Home.</h2>
                    <p class="text-xl text-text-muted mb-12 max-w-md">Choose how you'd like to use the app today.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                        <button onclick="setRole('senior')" class="bg-white p-10 rounded-3xl shadow-soft hover:shadow-floating border border-stone-100 text-left relative overflow-hidden group transition-all">
                            <div class="absolute -top-12 -right-12 w-48 h-48 bg-teal-50 rounded-full transition-transform group-hover:scale-125"></div>
                            <div class="relative z-10">
                                <div class="w-16 h-16 bg-brand-primary text-white rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-md"><i class="fa-solid fa-user"></i></div>
                                <h3 class="text-3xl font-bold text-brand-dark mb-2">I am a Senior</h3>
                                <p class="text-text-muted text-lg">Help, events, and health tools.</p>
                            </div>
                        </button>
                        <button onclick="setRole('volunteer')" class="bg-white p-10 rounded-3xl shadow-soft hover:shadow-floating border border-stone-100 text-left relative overflow-hidden group transition-all">
                            <div class="absolute -top-12 -right-12 w-48 h-48 bg-amber-50 rounded-full transition-transform group-hover:scale-125"></div>
                            <div class="relative z-10">
                                <div class="w-16 h-16 bg-brand-accent text-white rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-md"><i class="fa-solid fa-hand-holding-heart"></i></div>
                                <h3 class="text-3xl font-bold text-brand-dark mb-2">I am a Volunteer</h3>
                                <p class="text-text-muted text-lg">Help neighbors and earn points.</p>
                            </div>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderSeniorHome() {
            return `
                <div class="space-y-10">
                    <div class="bg-gradient-to-br from-brand-primary to-brand-dark text-white p-10 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                        <div class="relative z-10">
                            <h2 class="text-4xl font-bold mb-3">Hello, Friend.</h2>
                            <p class="text-teal-50 text-xl font-medium opacity-90">How can we help you today?</p>
                        </div>
                        <i class="fa-solid fa-cloud-sun text-[10rem] absolute -bottom-10 -right-10 text-white/10"></i>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${card('Request Help', 'request-hub', 'fa-truck-medical', 'teal', 'Food, meds, or rides')}
                        ${card('Safety Guard', 'safety-guard', 'fa-map-location-dot', 'rose', 'GPS and tracking')}
                        ${card('Daily Care', 'daily-care', 'fa-pills', 'indigo', 'Your routines')}
                        ${card('Events Hub', 'events-hub', 'fa-calendar-day', 'amber', 'Walks and talks')}
                        ${card('Video Call', 'video-call', 'fa-video', 'blue', 'Call a volunteer')}
                        ${card('Scan Docs', 'doc-scanner', 'fa-camera-retro', 'slate', 'Reading assistance')}
                    </div>
                </div>
            `;
        }

        // --- View Logic and Simulation Functions ---

        function card(title, target, icon, color, desc) {
            const colors = {
                teal: 'bg-teal-100 text-teal-700',
                rose: 'bg-rose-100 text-rose-700',
                indigo: 'bg-indigo-100 text-indigo-700',
                amber: 'bg-amber-100 text-amber-700',
                blue: 'bg-blue-100 text-blue-700',
                slate: 'bg-slate-100 text-slate-700'
            };
            
            return `
                <button onclick="router('${target}')" class="group bg-white p-8 rounded-3xl border border-stone-100 shadow-soft hover:shadow-floating transition-all text-left flex flex-col gap-6">
                    <div class="${colors[color]} w-16 h-16 rounded-2xl flex items-center justify-center text-3xl transition-transform group-hover:scale-110">
                        <i class="fa-solid ${icon}"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-brand-dark mb-1">${title}</h3>
                        <p class="text-text-muted font-medium">${desc}</p>
                    </div>
                </button>
            `;
        }

        function backButton(target) {
            return `<button onclick="router('${target}')" class="mb-8 flex items-center gap-3 text-brand-dark bg-white py-3 px-6 rounded-2xl shadow-sm border border-stone-100 hover:bg-stone-50 font-bold transition-all w-max"><i class="fa-solid fa-arrow-left"></i> Go Back</button>`;
        }

        // --- Dummy Views for Demo ---
        function renderDailyCare() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Daily Routine</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Medicine and check-in logs here.</div>`; }
        function renderSafetyGuard() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Safety Guard</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>GPS tracking active.</div>`; }
        function renderEventsHub() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Events</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Community events list.</div>`; }
        function renderVideoCall() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Video Connect</h2><div class='mt-10 p-10 bg-black rounded-3xl text-white text-center'>Simulating video stream...</div>`; }
        function renderDocScanner() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Scanner</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Scan your medical documents.</div>`; }
        function renderRequestHub() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Requests</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Request a transport or grocery delivery.</div>`; }
        function renderVolunteerDash() { return `${backButton('landing')}<h2 class="text-3xl font-bold">Volunteer Dashboard</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Tasks assigned to you.</div>`; }
        function renderCommunity() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Community</h2><div class='mt-10 p-10 bg-white rounded-3xl text-center'>Chat with others.</div>`; }
        function renderWisdomCorner() { return `${backButton('senior-home')}<h2 class="text-3xl font-bold">Wisdom Corner</h2>`; }

        // --- Utility ---
        function setRole(role) { appState.role = role; router(role === 'senior' ? 'senior-home' : 'volunteer-dash'); }
        function toggleSettings() { document.getElementById('settings-modal').showModal(); }
        function adjustFont(size) { document.documentElement.style.fontSize = size === 'large' ? '125%' : '100%'; }
        function toggleHighContrast() { 
            body.classList.toggle('bg-black'); body.classList.toggle('text-yellow-400');
            const btn = document.getElementById('contrast-btn');
            btn.innerText = body.classList.contains('bg-black') ? 'Normal Contrast' : 'High Contrast';
        }
        function triggerEmergency() {
            const confirmed = confirm("⚠ EMERGENCY CALL\n\nAre you sure you want to call emergency services?");
            if (confirmed) alert("Calling 911/112 now...");
        }
    </script>
</body>
</html>
